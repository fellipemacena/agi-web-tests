name: Java E2E Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Detect Chrome version
        shell: pwsh
        run: |
          $chromePath = "${{ steps.setup-chrome.outputs.chrome-path }}"
          $chromeVersionOutput = & "$chromePath" --version
          $chromeVersion = ($chromeVersionOutput -replace '[^0-9\.]', '')
          $chromeMajorVersion = $chromeVersion.Split('.')[0]
          "CHROME_PATH=$chromePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BROWSER_VERSION_MAJOR=$chromeMajorVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run tests and generate reports
        env:
          CI: "true"
        run: mvn -B clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-windows
          path: |
            target/allure-results
            target/site/allure-maven-plugin
            target/surefire-reports
            target/reports/surefire-report.html